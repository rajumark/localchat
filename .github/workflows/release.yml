name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name for this release'
        required: true
        type: string

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Sign Release APK (if keystore provided)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
            jarsigner -verbose \
              -sigalg SHA256withRSA \
              -digestalg SHA-256 \
              -keystore keystore.jks \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              app/build/outputs/apk/debug/app-debug.apk \
              "$KEY_ALIAS"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Generate release body
        run: |
          cat > release_body.md << 'EOF'
          ## 📦 LocalChat APK

          **Build:** ${{ github.ref_name }}

          ### ✅ Changelog
          - See [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for detailed changes.

          ### 📱 Installation
          1. Download the APK below.
          2. Open it on your Android device.
          3. If prompted, allow installation from unknown sources.

          ### ⚠️ Device Requirements
          - Android 14+ with AICore support (Pixel 8/9, Galaxy S24/S25, etc.)
          - See README for full compatibility list.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: release_body.md
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
